<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>강원 에코 트래블러 포스터</title>
  <style>
    :root{--forest:#166534;--leaf:#22c55e;--mint:#dcfce7;--sea:#0f766e;--sky:#e0f2fe;--ink:#10251c;--muted:#5f6f68;--paper:#fffdf7;--sun:#f59e0b;font-family:"Segoe UI","Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#dfeee5;color:var(--ink)}.poster{width:min(92vw,794px);aspect-ratio:210/297;position:relative;overflow:hidden;background:linear-gradient(180deg,#edfdf4 0%,#fffdf7 48%,#fff7ed 100%);box-shadow:0 24px 70px rgba(0,0,0,.18)}.poster:before{content:"";position:absolute;inset:0 0 auto;height:42%;background:linear-gradient(135deg,#f0fdfa,#ecfccb 58%,#fffbeb)}.visual{position:absolute;left:0;right:0;top:27%;height:34%;overflow:hidden}.mountain{position:absolute;right:-8%;bottom:20px;width:78%;height:100%;background:linear-gradient(145deg,#14532d,#22c55e);clip-path:polygon(0 100%,32% 18%,50% 58%,70% 6%,100% 100%)}.river{position:absolute;left:-8%;right:-8%;bottom:-34px;height:112px;background:#38bdf8;clip-path:polygon(0 38%,34% 0,62% 35%,100% 5%,100% 100%,0 100%)}.sun{position:absolute;right:11%;top:7%;width:76px;height:76px;border-radius:50%;background:#facc15;box-shadow:0 0 0 18px rgba(250,204,21,.22)}.content{position:relative;z-index:2;min-height:100%;display:grid;grid-template-rows:auto 1fr auto;padding:48px 52px 42px}.eyebrow{width:fit-content;margin:0 0 18px;padding:8px 12px;border-radius:999px;background:#fff;color:var(--sea);font-weight:900;text-transform:uppercase;font-size:15px}.brand{margin:0 0 12px;color:var(--forest);font-size:clamp(21px,3vw,30px);font-weight:900}h1{margin:0;max-width:650px;font-size:clamp(48px,8vw,84px);line-height:1.02;letter-spacing:0}.lead{max-width:560px;margin:20px 0 0;color:#31453a;font-size:clamp(18px,2.2vw,25px);line-height:1.45;font-weight:800}.hero-line{display:inline-block;width:fit-content;margin-top:16px;padding:10px 14px;border-radius:8px;background:var(--ink);color:#fff;font-size:clamp(17px,2vw,22px);font-weight:900}.bottom{display:grid;grid-template-columns:1fr 230px;gap:28px;align-items:end}.steps{display:grid;gap:12px;padding:18px;border-radius:8px;background:rgba(255,255,255,.9);border:1px solid #d8e6de}.step{display:grid;grid-template-columns:36px 1fr;gap:10px;align-items:center;font-size:18px;font-weight:900}.num{width:36px;height:36px;display:grid;place-items:center;border-radius:50%;background:var(--mint);color:var(--forest);font-weight:900}.qr-box{padding:14px;background:#fff;border-radius:8px;border:3px solid var(--ink);text-align:center}.qr-box img{width:100%;aspect-ratio:1;display:block}.qr-box strong{display:block;margin-top:10px;font-size:18px}.qr-box span{display:block;margin-top:4px;color:var(--muted);font-size:11px;word-break:break-all}.badge-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}.badge{padding:7px 9px;border-radius:999px;background:#dcfce7;color:#166534;font-size:13px;font-weight:900}@media print{body{background:#fff}.poster{width:210mm;height:297mm;box-shadow:none}}@media(max-width:680px){.content{padding:34px 28px 28px}.bottom{grid-template-columns:1fr}.qr-box{max-width:230px}.step{font-size:16px}}
  </style>
</head>
<body>
  <main class="poster" aria-label="강원 에코 트래블러 분리수거 안내 포스터"><div class="visual"><div class="sun"></div><div class="mountain"></div><div class="river"></div></div><section class="content"><div><p class="eyebrow">Gangwon Eco Traveler</p><p class="brand">강원 에코 트래블러</p><h1>강원도를 지키는 멋진 여행객</h1><p class="lead">쓰레기를 남기지 않는 여행이 강원도의 바다와 숲을 지킵니다. QR을 찍고 가까운 가까운 분리수거장 위치와 기본 배출 안내를 바로 확인하세요.</p><div class="hero-line">여행의 마무리까지 에코하게</div><div class="badge-row"><span class="badge">분리수거장 안내</span><span class="badge">위치 확인</span><span class="badge">분리수거장 안내</span></div></div><div></div><div class="bottom"><div class="steps"><div class="step"><div class="num">1</div><div>QR코드 스캔</div></div><div class="step"><div class="num">2</div><div>근처 분리수거장 확인</div></div><div class="step"><div class="num">3</div><div>올바른 배출함에 분리배출</div></div></div><div class="qr-box"><img alt="강원 에코 트래블러 서비스 접속 QR코드" src="qr-service.png"><strong>지금 스캔하기</strong><span>https://alsdudrlaalsdud.github.io/ECO-Travler/service.html</span></div></div></section></main>
</body>
</html>
